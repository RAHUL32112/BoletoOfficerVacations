<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل الإجازات — السجلات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --bg:#0A0E12; --panel:#121821; --border:#212C39; --text:#E4E9EF; --muted:#6B7A8D;
    --amber:#E8A33D; --red:#E5484D; --teal:#2FB8A6;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Tajawal', sans-serif; min-height:100vh; padding:28px 20px 60px; }
  .wrap{ max-width:920px; margin:0 auto; }
  .top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
  h1{ font-size:22px; margin:0; font-weight:700; }
  a.back{ color:var(--teal); text-decoration:none; font-size:13px; }
  a.back:hover{ text-decoration:underline; }
  .row{
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:12px 16px; margin-bottom:8px; display:grid; grid-template-columns:150px 90px 1fr 150px; gap:12px; align-items:center;
    font-size:13px;
  }
  @media (max-width:700px){ .row{ grid-template-columns:1fr; } }
  .row .ts{ color:var(--muted); direction:ltr; text-align:right; font-family:'JetBrains Mono', monospace; }
  .tag{ font-weight:700; padding:3px 8px; border-radius:5px; display:inline-block; width:fit-content; }
  .tag.added{ background:#1F3A2E; color:#4ADE80; }
  .tag.ended{ background:#3E2F1A; color:var(--amber); }
  .tag.deleted{ background:#3E1F21; color:var(--red); }
  .msg{ color:var(--text); }
  .actor{ color:var(--muted); text-align:left; }
  .empty, .denied{ text-align:center; padding:60px 20px; color:var(--muted); border:1px dashed var(--border); border-radius:10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>سجل الأحداث</h1>
    <a class="back" href="/">→ العودة إلى القائمة</a>
  </div>
  <div id="content">جارِ التحميل...</div>
</div>
<script>
const ACTION_LABEL = { added: 'إضافة', ended: 'إنهاء', deleted: 'حذف' };
function fmt(ts){
  return new Intl.DateTimeFormat('en-GB', { timeZone:'Asia/Riyadh', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', hour12:false }).format(new Date(ts)) + ' (بتوقيت السعودية)';
}
async function load(){
  const el = document.getElementById('content');
  const res = await fetch('/api/logs');
  if(res.status === 401){ el.innerHTML = '<div class="denied">الرجاء <a href="/" style="color:var(--teal)">تسجيل الدخول</a> أولاً.</div>'; return; }
  if(res.status === 403){ el.innerHTML = '<div class="denied">ليس لديك صلاحية لعرض السجلات.</div>'; return; }
  const logs = await res.json();
  if(logs.length === 0){ el.innerHTML = '<div class="empty">لا يوجد نشاط بعد.</div>'; return; }
  el.innerHTML = logs.map(l => `
    <div class="row">
      <div class="ts">${fmt(l.ts)}</div>
      <div><span class="tag ${l.action}">${ACTION_LABEL[l.action] || l.action}</span></div>
      <div class="msg">${l.targetName} (${l.targetDiscordId}) — ${l.note}</div>
      <div class="actor">بواسطة ${l.actorUsername}</div>
    </div>
  `).join('');
}
load();
</script>
</body>
</html>
